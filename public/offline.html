<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Flick — offline</title>
    <meta name="theme-color" content="#0a0a0a" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #f5f5f5; font-family: -apple-system, "Segoe UI", Roboto, Inter, sans-serif; }
      .wrap { min-height: 100dvh; display: grid; place-items: center; padding: 24px; text-align: center; }
      .card { max-width: 420px; }
      .dot { display:inline-block; width:10px; height:10px; border-radius:99px; background:#B4FF50; box-shadow:0 0 24px #B4FF50; margin-right:8px; vertical-align:middle; animation: p 1.4s infinite ease-in-out; }
      h1 { font-size: 40px; letter-spacing: -0.02em; margin: 8px 0 12px; }
      p { color: #a3a3a3; line-height: 1.5; }
      button { margin-top: 20px; background: #B4FF50; color: #000; border: 0; padding: 14px 24px; border-radius: 999px; font-weight: 700; cursor: pointer; }
      @keyframes p { 0%,100%{opacity:.4} 50%{opacity:1} }
    </style>
  </head>
  <body>
    <div class="wrap"><div class="card">
      <span class="dot"></span><span style="text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:#a3a3a3">offline</span>
      <h1>You're offline</h1>
      <p>Flick needs an internet connection for live posts, stories and messages. Cached screens will still open — reconnect to keep flicking.</p>
      <button onclick="location.reload()">Try again</button>
    </div></div>
  </body>
</html>
